<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>테트리스</h1>
      <p class="subtitle">HTML · CSS · JavaScript 학습용 프로젝트</p>
    </header>

    <section class="game-layout">
      <div class="board-area">
        <canvas id="gameBoard" width="300" height="600" aria-label="테트리스 게임 보드"></canvas>
      </div>

      <aside class="side-panel">
        <div class="panel-box">
          <h2>점수</h2>
          <p id="score" class="score-value">0</p>
          <p id="status" class="status-message" aria-live="polite"></p>
        </div>

        <div class="panel-box button-group">
          <button id="startBtn" type="button">시작</button>
          <button id="restartBtn" type="button">재시작</button>
        </div>

        <div class="panel-box">
          <h2>조작법</h2>
          <ul class="controls-list">
            <li><kbd>←</kbd> <kbd>→</kbd> 좌우 이동</li>
            <li><kbd>↓</kbd> 빠르게 내리기</li>
            <li><kbd>↑</kbd> 또는 <kbd>Space</kbd> 회전</li>
            <li><kbd>P</kbd> 일시정지</li>
          </ul>
        </div>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
