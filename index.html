<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>테트리스</h1>
      <p class="subtitle">HTML · CSS · JavaScript 학습용 프로젝트</p>
    </header>

    <section class="game-layout">
      <div class="board-area">
        <canvas id="gameBoard" tabindex="0" aria-label="테트리스 게임 보드"></canvas>
        <div id="boardOverlay" class="board-overlay" hidden></div>
      </div>

      <aside class="side-panel">
        <div class="panel-box">
          <h2>점수</h2>
          <p id="score" class="score-value" aria-live="polite" aria-label="현재 점수">0</p>
          <p id="status" class="status-message" aria-live="polite"></p>
        </div>

        <div class="panel-box">
          <h2>레벨</h2>
          <p id="level" class="level-value" aria-live="polite" aria-label="현재 레벨">1</p>
          <p id="levelFeedback" class="level-feedback" hidden aria-live="polite"></p>
          <p class="level-target-label">다음 레벨 목표 (누적 점수)</p>
          <p id="levelTarget" class="level-target">누적 0 / 500점</p>
        </div>

        <div class="panel-box preview-box">
          <h2>홀드</h2>
          <canvas id="holdCanvas" width="80" height="80" aria-label="홀드 블록 미리보기"></canvas>
        </div>

        <div class="panel-box preview-box">
          <h2>다음</h2>
          <canvas id="nextCanvas" width="80" height="80" aria-label="다음 블록 미리보기"></canvas>
        </div>

        <div class="panel-box button-group">
          <button id="startBtn" type="button">시작</button>
          <button id="restartBtn" type="button">재시작</button>
        </div>

        <div class="panel-box">
          <h2>조작법</h2>
          <p class="controls-hint">게임 시작 후 키보드로 조작할 수 있습니다.</p>
          <ul class="controls-list">
            <li><kbd>←</kbd> <kbd>→</kbd> 좌우 이동</li>
            <li><kbd>↓</kbd> 소프트 드롭 (+1점)</li>
            <li><kbd>↑</kbd> 회전 (SRS 벽 킥)</li>
            <li><kbd>Space</kbd> 하드 드롭 (+2점/칸)</li>
            <li><kbd>C</kbd> 또는 <kbd>Shift</kbd> 홀드</li>
            <li><kbd>P</kbd> 일시정지</li>
            <li>레벨이 오를수록 블록이 빨라집니다</li>
          </ul>
        </div>

        <div class="panel-box touch-controls" aria-label="터치 조작">
          <h2>터치 조작</h2>
          <div class="touch-grid">
            <button type="button" class="touch-btn" data-action="hold" aria-label="홀드">H</button>
            <button type="button" class="touch-btn" data-action="rotate" aria-label="회전">↻</button>
            <button type="button" class="touch-btn" data-action="drop" aria-label="하드 드롭">⬇</button>
            <button type="button" class="touch-btn" data-action="left" aria-label="왼쪽 이동">←</button>
            <button type="button" class="touch-btn" data-action="down" aria-label="소프트 드롭">↓</button>
            <button type="button" class="touch-btn" data-action="right" aria-label="오른쪽 이동">→</button>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
